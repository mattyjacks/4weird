<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">

    <!-- Open Graph -->
    <meta property="og:title" content="Spaceship Simulation - 4weird Games">
    <meta property="og:description" content="Fullscreen interactive 3D spaceship steering and flocking simulation.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://4weird.com/spaceships.html">
    <meta property="og:image" content="https://4weird.com/games/images/thumb_serversavershield.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Spaceship Simulation - 4weird Games">
    <meta name="twitter:description" content="Fullscreen interactive 3D spaceship simulation.">
    <meta name="twitter:image" content="https://4weird.com/games/images/thumb_serversavershield.png">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">

      "@type": "BreadcrumbList",

        "@type": "ListItem",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Spaceship Steering and Flocking Simulation",
      "operatingSystem": "All",
      "applicationCategory": "GameApplication",
      "browserRequirements": "Requires HTML5, WebGL, and Javascript support.",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      }
    }
    </script>
    <style>
        :root {
            --bg-primary: #05030a;
            --text-primary: #f5f5f5;
            --text-secondary: #9ca3af;
            --neon-purple: #8b5cf6;
            --neon-cyan: #06b6d4;
            --neon-green: #10b981;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* Fullscreen Overlay HUD Wrapper */
        .hud-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HUD Panels (interactive elements need pointer-events auto) */
        .hud-panel {
            pointer-events: auto;
            background: rgba(10, 5, 25, 0.75);
            border: 1px solid rgba(139, 92, 246, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease;
        }

        .hud-panel:hover {
            border-color: rgba(6, 182, 212, 0.4);
        }

        /* Top Bar Layout */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.8rem;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            outline: none;
            border: 1px solid transparent;
        }

        .btn-exit {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }

        .btn-exit:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
        }

        .btn-restart {
            background: rgba(139, 92, 246, 0.15);
            color: var(--neon-purple);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .btn-restart:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            transform: translateY(-1px);
        }

        /* Controls / Dilation Controls Panel */
        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 280px;
        }

        .panel-title {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--neon-cyan);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            padding-bottom: 6px;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .slider-val {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--neon-green);
        }

        .dilation-slider {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .dilation-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            transition: transform 0.1s;
        }

        .dilation-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* Bottom Row HUD */
        .hud-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }

        /* Credits Balance HUD */
        .credits-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 160px;
        }

        .credits-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .credits-value {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        /* Help Legend */
        .legend-panel {
            font-size: 0.75rem;
            color: var(--text-secondary);
            max-width: 280px;
            line-height: 1.5;
        }

        .legend-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .legend-key {
            font-family: var(--font-display);
            color: var(--neon-cyan);
            font-weight: 700;
            background: rgba(6, 182, 212, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(6, 182, 212, 0.25);
        }

        /* Camera mode toggles */
        .camera-toggles {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-cam {
            font-size: 0.65rem;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .btn-cam.active {
            background: rgba(6, 182, 212, 0.15);
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

        /* Custom Audio Toggle */
        .btn-audio {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border-color: rgba(255, 255, 255, 0.1);
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
        }

        .btn-audio:hover {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
        }

    </style>
</head>
<body class="fullscreen-sim">
    <!-- Starfield/Simulation Viewport Canvas -->
    <canvas id="starfield"></canvas>

    <!-- Overlay UI HUD HUD -->
    <div class="hud-overlay">
        <!-- Top Row -->
        <div class="hud-header">
            <div class="logo">
                <span>🚀</span> Systems Sim
            </div>
            
            <div style="display: flex; gap: 12px; align-items: center; pointer-events: auto;">
                <button class="btn btn-audio" id="btn-sound-toggle" title="Toggle Simulation Audio">🔊</button>
                <button class="btn btn-restart" id="btn-restart-sim">Restart Sim</button>
                <button class="btn btn-exit" id="btn-exit-fullscreen">Exit Fullscreen</button>
            </div>
        </div>

        <!-- Bottom Row -->
        <div class="hud-footer">
            <!-- Left Corner: Steering & Camera controls -->
            <div class="hud-panel controls-panel">
                <div class="panel-title">Simulation Speed</div>
                <div class="slider-group">
                    <div class="slider-labels">
                        <span>Time Dilation</span>
                        <span class="slider-val" id="time-dilation-val">1.0x</span>
                    </div>
                    <input type="range" class="dilation-slider" id="dilation-slider" min="0.1" max="4.0" step="0.1" value="1.0">
                </div>

                <div class="panel-title" style="margin-top: 10px;">Camera View Mode</div>
                <div class="camera-toggles">
                    <button class="btn-cam active" data-mode="chase">Chase</button>
                    <button class="btn-cam" data-mode="top">Top</button>
                    <button class="btn-cam" data-mode="side">Side</button>
                    <button class="btn-cam" data-mode="orbit">Orbit</button>
                </div>
            </div>

            <!-- Center: Credits Balance display -->
            <div class="hud-panel credits-panel">
                <div class="credits-label">Credits Balance</div>
                <div class="credits-value" id="hud-credits">0 CR</div>
            </div>

            <!-- Right Corner: Keyboard Controls Help Legend -->
            <div class="hud-panel legend-panel">
                <div class="panel-title">Manual Flight Controls</div>
                <div class="legend-row">
                    <span>Steer Lead Ship</span>
                    <span class="legend-key">W/A/S/D</span>
                </div>
                <div class="legend-row" style="margin-top: 4px;">
                    <span>Tilt / Pitch</span>
                    <span class="legend-key">↑ / ↓</span>
                </div>
                <div class="legend-row" style="margin-top: 4px;">
                    <span>Fire Plasma Cannons</span>
                    <span class="legend-key">Spacebar</span>
                </div>
                <div style="font-size: 0.65rem; color: var(--neon-cyan); margin-top: 8px; text-align: center; font-weight: 500;">
                    *Steering overrides autopilot mode
                </div>
            </div>
        </div>
    </div>

    <!-- Load Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Load Game core modules -->
    <script type="module" src="spaceships/main.js?v=11"></script>

    <!-- Page Specific Script binds -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Exit Button listener
            const exitBtn = document.getElementById('btn-exit-fullscreen');
            exitBtn.addEventListener('click', () => {
                // Try window.close() first if opened in new tab, fallback to going back home
                window.close();
                setTimeout(() => {
                    window.location.href = "/";
                }, 100);
            });

            // Camera toggle triggers
            const camButtons = document.querySelectorAll('.btn-cam');
            camButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    camButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const mode = btn.getAttribute('data-mode');
                    if (window.spaceGameCore) {
                        window.spaceGameCore.state.cameraMode = mode;
                    }
                });
            });

            // Time Dilation slider link
            const slider = document.getElementById('dilation-slider');
            const sliderVal = document.getElementById('time-dilation-val');
            slider.addEventListener('input', () => {
                const val = parseFloat(slider.value);
                sliderVal.textContent = val.toFixed(1) + 'x';
                if (window.spaceGameCore) {
                    window.spaceGameCore.timeScale = val;
                }
            });

            // Restart trigger
            const restartBtn = document.getElementById('btn-restart-sim');
            restartBtn.addEventListener('click', () => {
                if (window.spaceGameMain) {
                    window.spaceGameMain.destroy();
                    window.spaceGameMain.init();
                    
                    // Reset HUD time scale
                    if (window.spaceGameCore) {
                        window.spaceGameCore.timeScale = parseFloat(slider.value);
                    }
                }
            });

            // Sync audio toggle with core UI
            const soundBtn = document.getElementById('btn-sound-toggle');
            soundBtn.addEventListener('click', () => {
                if (window.spaceGameCore) {
                    const soundSystem = window.spaceGameCore.getSystem('audiosystem') || window.spaceGameCore.soundSystem;
                    if (soundSystem) {
                        const isMuted = soundSystem.toggleMute();
                        soundBtn.textContent = isMuted ? '🔇' : '🔊';
                    }
                }
            });
        });
    </script>
</body>
</html>
